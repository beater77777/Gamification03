<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beater Levels</title>
<link rel="manifest" href="manifest.json">

<style>
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0f1115;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:0;
  padding:20px;
}

.card{
  background:#171a21;
  padding:20px;
  border-radius:20px;
  width:95%;
  max-width:450px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  margin-bottom:20px;
}

.app-header{
  background: linear-gradient(135deg,#6ee7ff,#8b5cf6);
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.level{font-size:36px;text-align:center;}
.bar{height:12px;background:#2a2f3a;border-radius:10px;overflow:hidden;margin:10px 0;}
.progress{height:100%;background:linear-gradient(90deg,#6ee7ff,#8b5cf6);width:0%;transition:.3s;}

.task{display:flex;align-items:center;justify-content:space-between;margin:8px 0;}

button{border:none;border-radius:12px;cursor:pointer;}

.plus{
  width:48px;height:48px;font-size:26px;color:white;
  background:linear-gradient(135deg,#6ee7ff,#8b5cf6);
}

.edit{background:#2a2f3a;color:white;padding:6px 10px;margin-left:6px;}

.addBtn{
  background:linear-gradient(135deg,#6ee7ff,#8b5cf6);
  color:white;padding:10px 14px;border-radius:10px;margin-left:8px;
}

input{flex:1;padding:8px;border-radius:10px;border:none;}

.nav{text-align:center;margin-top:10px;}
.nav a{color:#8b5cf6;text-decoration:none;}

/* FX */
#fx-container{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
}

.xp-float{
  position:absolute;
  font-size:28px;
  font-weight:bold;
  color:#6ee7ff;
  animation:floatUp 0.8s forwards;
}

@keyframes floatUp{
  from{transform:translate(-50%,0);opacity:1;}
  to{transform:translate(-50%,-80px);opacity:0;}
}

.level-up{
  position:absolute;
  font-size:42px;
  font-weight:900;
  color:#ffd700;
  text-shadow:0 0 20px #ffea00;
  animation:levelUpAnim 1s forwards;
}

@keyframes levelUpAnim{
  from{transform:translate(-50%,0);opacity:1;}
  to{transform:translate(-50%,-120px);opacity:0;}
}

.particle{
  position:absolute;
  width:6px;height:6px;
  border-radius:50%;
  background:#8b5cf6;
  animation:explode 0.7s forwards;
}

.gold{background:#ffd700;}

@keyframes explode{
  from{transform:translate(0,0);}
  to{transform:translate(var(--x),var(--y));opacity:0;}
}
</style>
</head>

<body>

<div class="card">
  <div class="app-header">
    <h1>Beater Levels</h1>
  </div>

  <div id="level"></div>
  <div id="xp"></div>
  <div class="bar"><div class="progress" id="progress"></div></div>
</div>

<div class="card">
  <div id="tasks"></div>
  <div style="display:flex;margin-top:10px;">
    <input id="newTask">
    <button class="addBtn" onclick="addTask()">Add</button>
  </div>
</div>

<div class="nav">
  <a href="stats.html">Statistics</a>
</div>

<div id="fx-container"></div>

<script>
let data = JSON.parse(localStorage.getItem("levelsData")) || {
xp:0,
tasks:[{name:"task",count:0}],
days:{}
};

function save(){localStorage.setItem("levelsData",JSON.stringify(data));}

function spawnXP(x,y){
  let c=document.getElementById("fx-container");

  let el=document.createElement("div");
  el.className="xp-float";
  el.innerText="+1";
  el.style.left=x+"px";
  el.style.top=y+"px";
  c.appendChild(el);
  setTimeout(()=>el.remove(),800);

  for(let i=0;i<10;i++){
    let p=document.createElement("div");
    p.className="particle";

    let a=Math.random()*Math.PI*2;
    let d=40+Math.random()*40;

    p.style.left=x+"px";
    p.style.top=y+"px";
    p.style.setProperty("--x",Math.cos(a)*d+"px");
    p.style.setProperty("--y",Math.sin(a)*d+"px");

    c.appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
}

function spawnLevelUp(){
  let c=document.getElementById("fx-container");

  let el=document.createElement("div");
  el.className="level-up";
  el.innerText="UP!";
  el.style.left=window.innerWidth/2+"px";
  el.style.top=window.innerHeight/2+"px";
  c.appendChild(el);
  setTimeout(()=>el.remove(),1000);

  for(let i=0;i<20;i++){
    let p=document.createElement("div");
    p.className="particle gold";

    let a=Math.random()*Math.PI*2;
    let d=60+Math.random()*60;

    p.style.left=window.innerWidth/2+"px";
    p.style.top=window.innerHeight/2+"px";
    p.style.setProperty("--x",Math.cos(a)*d+"px");
    p.style.setProperty("--y",Math.sin(a)*d+"px");

    c.appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
}

function update(){
let level=Math.floor(data.xp/5);
document.getElementById("level").innerText="Level "+level;
document.getElementById("xp").innerText=data.xp+" XP";
document.getElementById("progress").style.width=((data.xp%5)/5*100)+"%";

let list=document.getElementById("tasks");
list.innerHTML="";

data.tasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task";

div.innerHTML=`
<span>${t.name} (${t.count})</span>
<div>
<button class="plus" onclick="addXP(${i}, this)">+</button>
</div>`;

list.appendChild(div);
});

save();
}

function addXP(i, el){
let prevLevel=Math.floor(data.xp/5);

data.xp++;
data.tasks[i].count++;

let rect=el.getBoundingClientRect();
spawnXP(rect.left+rect.width/2, rect.top);

let newLevel=Math.floor(data.xp/5);
if(newLevel>prevLevel){
  spawnLevelUp();
}

update();
}

function addTask(){
let val=document.getElementById("newTask").value.trim();
if(!val) return;
data.tasks.push({name:val,count:0});
update();
}

update();
</script>

</body>
</html>
