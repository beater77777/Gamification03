<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beater Levels</title>
<link rel="manifest" href="manifest.json">

<style>
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0f1115;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:0;
  padding:20px;
}

.card{
  background:#171a21;
  padding:20px;
  border-radius:20px;
  width:95%;
  max-width:450px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  margin-bottom:20px;
}

.app-header{
  background: linear-gradient(135deg,#6ee7ff,#8b5cf6);
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.app-header h1{
  margin:0;
  font-size:26px;
  font-weight:700;
  letter-spacing:1px;
}

.subtitle{
  margin:5px 0 0;
  font-size:13px;
  opacity:0.8;
}

.level{font-size:36px;text-align:center;}
.bar{height:12px;background:#2a2f3a;border-radius:10px;overflow:hidden;margin:10px 0;}
.progress{height:100%;background:linear-gradient(90deg,#6ee7ff,#8b5cf6);width:0%;transition:.3s;}

.task{display:flex;align-items:center;justify-content:space-between;margin:8px 0;}

button{border:none;border-radius:12px;cursor:pointer;}

.plus{
  width:48px;height:48px;font-size:26px;color:white;
  background:linear-gradient(135deg,#6ee7ff,#8b5cf6);
  transition:transform .15s, box-shadow .15s;
  box-shadow:0 4px 15px rgba(0,0,0,.4);
}
.plus:active{transform:scale(1.25);box-shadow:0 0 20px #8b5cf6;}

.edit{background:#2a2f3a;color:white;padding:6px 10px;margin-left:6px;}

.addBtn{
  background:linear-gradient(135deg,#6ee7ff,#8b5cf6);
  color:white;padding:10px 14px;border-radius:10px;margin-left:8px;
}

input{flex:1;padding:8px;border-radius:10px;border:none;}

.small{opacity:.5;font-size:12px;cursor:pointer;text-align:right;}
.streak{text-align:center;margin-bottom:8px;}

.nav{text-align:center;margin-top:10px;}
.nav a{color:#8b5cf6;text-decoration:none;}

/* FX */
#fx-container{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
}

.xp-float{
  position:absolute;
  font-size:28px;
  font-weight:bold;
  color:#6ee7ff;
  text-shadow:0 0 10px #8b5cf6;
  animation:floatUp 0.8s ease-out forwards;
}

@keyframes floatUp{
  0%{transform:translate(-50%,0) scale(0.5);opacity:0;}
  30%{opacity:1;}
  100%{transform:translate(-50%,-80px) scale(1.4);opacity:0;}
}

/* 🔥 LEVEL UP */
.level-up{
  position:absolute;
  font-size:42px;
  font-weight:900;
  color:#ffd700;
  text-shadow:0 0 20px #ffea00, 0 0 40px #ffae00;
  animation:levelUpAnim 1s ease-out forwards;
}

@keyframes levelUpAnim{
  0%{transform:translate(-50%,0) scale(0.5);opacity:0;}
  30%{opacity:1;}
  100%{transform:translate(-50%,-120px) scale(1.6);opacity:0;}
}

.particle{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#8b5cf6;
  animation:explode 0.7s ease-out forwards;
}

@keyframes explode{
  0%{transform:translate(0,0);opacity:1;}
  100%{transform:translate(var(--x),var(--y));opacity:0;}
}

/* золотые частицы */
.gold{
  background:#ffd700;
}
</style>
</head>

<body>

<div class="card">
  <div class="app-header">
    <h1>Beater Levels</h1>
    <p class="subtitle">Level up your life</p>
  </div>

  <div class="streak" id="streak"></div>
  <div class="level" id="level"></div>
  <div id="xp"></div>
  <div class="bar"><div class="progress" id="progress"></div></div>
  <div class="small" onclick="editXP()">edit xp</div>
</div>

<div class="card">
  <div style="text-align:center;font-size:20px;margin-bottom:10px;">Tasks</div>
  <div id="tasks"></div>

  <div style="display:flex;margin-top:10px;">
    <input id="newTask" placeholder="New task">
    <button class="addBtn" onclick="addTask()">Add</button>
  </div>
</div>

<div class="nav">
  <a href="stats.html">Statistics</a>
</div>

<div id="fx-container"></div>

<script>
let data = JSON.parse(localStorage.getItem("levelsData")) || {
xp:51,
tasks:[{name:"point",count:0}],
days:{},
};

let today = new Date().toISOString().slice(0,10);

function save(){localStorage.setItem("levelsData",JSON.stringify(data));}

function streakCount(){
let dates = Object.keys(data.days).sort();
let streak=0;
for(let i=dates.length-1;i>=0;i--){
if(data.days[dates[i]]>0){streak++;}else break;
}
return streak;
}

function spawnXP(x,y){
  let container = document.getElementById("fx-container");

  let xp = document.createElement("div");
  xp.className="xp-float";
  xp.innerText="+1";
  xp.style.left = x+"px";
  xp.style.top = y+"px";
  container.appendChild(xp);
  setTimeout(()=>xp.remove(),800);

  for(let i=0;i<12;i++){
    let p=document.createElement("div");
    p.className="particle";

    let angle=Math.random()*Math.PI*2;
    let dist=40+Math.random()*40;

    let dx=Math.cos(angle)*dist+"px";
    let dy=Math.sin(angle)*dist+"px";

    p.style.left=x+"px";
    p.style.top=y+"px";
    p.style.setProperty("--x",dx);
    p.style.setProperty("--y",dy);

    container.appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
}

/* 🔥 LEVEL UP эффект */
function spawnLevelUp(x,y){
  let container = document.getElementById("fx-container");

  let el = document.createElement("div");
  el.className="level-up";
  el.innerText="UP!";
  el.style.left = x+"px";
  el.style.top = y+"px";
  container.appendChild(el);
  setTimeout(()=>el.remove(),1000);

  // золотые частицы
  for(let i=0;i<20;i++){
    let p=document.createElement("div");
    p.className="particle gold";

    let angle=Math.random()*Math.PI*2;
    let dist=60+Math.random()*60;

    let dx=Math.cos(angle)*dist+"px";
    let dy=Math.sin(angle)*dist+"px";

    p.style.left=x+"px";
    p.style.top=y+"px";
    p.style.setProperty("--x",dx);
    p.style.setProperty("--y",dy);

    container.appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
}

function update(){
let level=Math.floor(data.xp/5);
document.getElementById("level").innerText="Level "+level;
document.getElementById("xp").innerText=data.xp+" XP";
document.getElementById("progress").style.width=((data.xp%5)/5*100)+"%";
document.getElementById("streak").innerText="🔥 "+streakCount()+" days";

let list=document.getElementById("tasks");
list.innerHTML="";
data.tasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task";
div.innerHTML=`
<span>${t.name} (${t.count})</span>
<div>
<button class="plus" onclick="addXP(${i}, event)">+</button>
<button class="edit" onclick="renameTask(${i})">✏️</button>
<button class="edit" onclick="deleteTask(${i})">🗑</button>
</div>`;
list.appendChild(div);
});
save();
}

function addXP(i,event){
let prevLevel = Math.floor(data.xp/5);

data.xp++;
data.tasks[i].count++;

let rect = event.target.getBoundingClientRect();
let x = rect.left + rect.width/2;
let y = rect.top;

spawnXP(x,y);

let newLevel = Math.floor(data.xp/5);

/* если уровень вырос */
if(newLevel > prevLevel){
  spawnLevelUp(window.innerWidth/2, window.innerHeight/2);
}

if(!data.days[today]) data.days[today]=0;
data.days[today]++;
update();
}

function addTask(){
let name=document.getElementById("newTask").value.trim();
if(!name) return;
data.tasks.push({name:name,count:0});
document.getElementById("newTask").value="";
update();
}

function renameTask(i){
let n=prompt("New name",data.tasks[i].name);
if(n){data.tasks[i].name=n;}
update();
}

function deleteTask(i){
if(confirm("Delete task?")){
data.tasks.splice(i,1);
update();
}
}

function editXP(){
let n=prompt("Set XP",data.xp);
if(n!==null){
data.xp=parseInt(n)||0;
update();
}
}

update();

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>

</body>
</html>
